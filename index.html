<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Left Keep Memo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
5555
<main id="app">

  <section id="listScreen" class="screen active">
    <header class="topBar">
      <div class="searchBox">Keep風メモを検索</div>
      <input id="searchInput" type="search" placeholder="検索">
    </header>

    <section>
      <h2>固定済み</h2>
      <div id="pinnedNotes" class="noteGrid"></div>
    </section>

    <section>
      <h2>その他</h2>
      <div id="normalNotes" class="noteGrid"></div>
    </section>

    <button id="addBtn" class="fab">＋</button>
  </section>

  <section id="editScreen" class="screen">
    <textarea id="titleInput" class="titleInput" placeholder="タイトル"></textarea>
    <textarea id="bodyInput" class="bodyInput" placeholder="メモ"></textarea>

    <div class="leftControls">
      <button id="backBtn">◀</button>
      <button id="micBtn">🎤</button>
      <button id="pinBtn">固定</button>
      <button id="deleteBtn">削除</button>
    </div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
